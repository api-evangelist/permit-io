aid: permit-io
name: Permit.io
description: Permit.io is an authorization-as-a-service platform that helps developers build, manage, and enforce fine-grained
  access control in their applications. It provides a Policy Decision Point (PDP), management API, REST API, and permission
  query APIs for role-based, attribute-based, and relationship-based access control with support for bulk checks, data filtering,
  and URL-based enforcement.
