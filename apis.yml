    description: >-
      The Permit.io API (v2) is the management and authorization API for the
      Permit.io platform, covering members, API keys, organizations, projects,
      environments, resources, roles, role assignments, condition sets,
      relationships, implicit grants, and bulk operations for authorization
      management and enforcement.
