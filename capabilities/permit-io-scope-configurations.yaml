      description: Get Scope Config
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: permit-io-scope-configurations.getscopeconfig
      with:
        proj_id: tools.proj_id
        env_id: tools.env_id
      outputParameters:
      - type: object
        mapping: $.
    - name: set-scope-config
      description: Set Scope Config
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: permit-io-scope-configurations.setscopeconfig
      with:
        proj_id: tools.proj_id
        env_id: tools.env_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: reset-scope-config
      description: Reset Scope Config
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: permit-io-scope-configurations.resetscopeconfig
      with:
        proj_id: tools.proj_id
        env_id: tools.env_id
      outputParameters:
      - type: object
        mapping: $.
