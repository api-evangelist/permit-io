      operations:
      - name: listapieventsv2historyget
        method: GET
        description: List Api Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: method
          in: query
          type: array
          description: HTTP methods to include in search
        - name: path
          in: query
          type: array
          description: API paths to include in search
        - name: success
