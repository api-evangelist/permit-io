      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: permit-io-organizations.deleteorganization
      with:
        org_id: tools.org_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-organization
      description: Update Organization
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: permit-io-organizations.updateorganization
      with:
        org_id: tools.org_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stats-organization
      description: Stats Organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: permit-io-organizations.statsorganization
      with:
        org_id: tools.org_id
      outputParameters:
      - type: object
        mapping: $.
