openapi: 3.1.0
info:
  title: Permit.io Access Requests (EAP) Access Requests (EAP) OPAL Data ( EAP ) API
  description: '

    Authorization as a service

    '
  version: 2.0.0
tags:
- name: OPAL Data ( EAP )
paths:
  /v2/internal/opal_data/{org_id}/{proj_id}/{env_id}/optimized:
    get:
      tags:
      - OPAL Data ( EAP )
      summary: Get All Data Optimized
      operationId: get_all_data_optimized
      parameters:
      - description: 'Either the unique id of the organization, or the URL-friendly key of the organization (i.e: the "slug").'
        required: true
        schema:
          type: string
          format: uuid
          title: Org Id
          description: 'Either the unique id of the organization, or the URL-friendly key of the organization (i.e: the "slug").'
        example: my_organization
        name: org_id
        in: path
      - description: 'Either the unique id of the project, or the URL-friendly key of the project (i.e: the "slug").'
        required: true
        schema:
          type: string
          title: Proj Id
          description: 'Either the unique id of the project, or the URL-friendly key of the project (i.e: the "slug").'
        example: my_project
        name: proj_id
        in: path
      - description: 'Either the unique id of the environment, or the URL-friendly key of the environment (i.e: the "slug").'
        required: true
        schema:
          type: string
          title: Env Id
          description: 'Either the unique id of the environment, or the URL-friendly key of the environment (i.e: the "slug").'
        example: my_environment
        name: env_id
        in: path
      - required: false
        schema:
          type: integer
          minimum: 0.0
          title: X-Shard-Id
        name: X-Shard-ID
        in: header
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/permit_backend__schemas__schema_opal_data__FullData'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /v2/internal/opal_data/{org_id}/{proj_id}/{env_id}:
    get:
      tags:
      - OPAL Data ( EAP )
      summary: Get All Data
      operationId: get_all_data
      parameters:
      - description: 'Either the unique id of the organization, or the URL-friendly key of the organization (i.e: the "slug").'
        required: true
        schema:
          type: string
          format: uuid
          title: Org Id
          description: 'Either the unique id of the organization, or the URL-friendly key of the organization (i.e: the "slug").'
        example: my_organization
        name: org_id
        in: path
      - description: 'Either the unique id of the project, or the URL-friendly key of the project (i.e: the "slug").'
        required: true
        schema:
          type: string
          title: Proj Id
          description: 'Either the unique id of the project, or the URL-friendly key of the project (i.e: the "slug").'
        example: my_project
        name: proj_id
        in: path
      - description: 'Either the unique id of the environment, or the URL-friendly key of the environment (i.e: the "slug").'
        required: true
        schema:
          type: string
          title: Env Id
          description: 'Either the unique id of the environment, or the URL-friendly key of the environment (i.e: the "slug").'
        example: my_environment
        name: env_id
        in: path
      - description: Timeout for the data generation in the new data generation mode
        required: false
        schema:
          type: number
          maximum: 1800.0
          exclusiveMinimum: 0.0
          title: Timeout
          description: Timeout for the data generation in the new data generation mode
          default: 600.0
        name: timeout
        in: query
      - required: false
        schema:
          type: integer
          minimum: 0.0
          title: X-Shard-Id
        name: X-Shard-ID
        in: header
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/data_generator_lib__schemas__schema_opal_data__FullData'
                - $ref: '#/components/schemas/permit_backend__schemas__schema_opal_data__FullData'
                title: Response Get All Data V2 Internal Opal Data  Org Id   Proj Id   Env Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /v2/internal/opal_data/{org_id}/{proj_id}/{env_id}/users:
    get:
      tags:
      - OPAL Data ( EAP )
      summary: Get All Users Data
      operationId: get_all_users_data
      parameters:
      - description: 'Either the unique id of the organization, or the URL-friendly key of the organization (i.e: the "slug").'
        required: true
        schema:
          type: string
          format: uuid
          title: Org Id
          description: 'Either the unique id of the organization, or the URL-friendly key of the organization (i.e: the "slug").'
        example: my_organization
        name: org_id
        in: path
      - description: 'Either the unique id of the project, or the URL-friendly key of the project (i.e: the "slug").'
        required: true
        schema:
          type: string
          title: Proj Id
          description: 'Either the unique id of the project, or the URL-friendly key of the project (i.e: the "slug").'
        example: my_project
        name: proj_id
        in: path
      - description: 'Either the unique id of the environment, or the URL-friendly key of the environment (i.e: the "slug").'
        required: true
        schema:
          type: string
          title: Env Id
          description: 'Either the unique id of the environment, or the URL-friendly key of the environment (i.e: the "slug").'
        example: my_environment
        name: env_id
        in: path
      - description: Timeout for the data generation in the new data generation mode
        required: false
        schema:
          type: number
          maximum: 1800.0
          exclusiveMinimum: 0.0
          title: Timeout
          description: Timeout for the data generation in the new data generation mode
          default: 600.0
        name: timeout
        in: query
      - required: false
        schema:
          type: integer
          minimum: 0.0
          title: X-Shard-Id
        name: X-Shard-ID
        in: header
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                - additionalProperties:
                    $ref: '#/components/schemas/data_generator_lib__schemas__schema_opal_data__UserData'
                  type: object
                - additionalProperties:
                    $ref: '#/components/schemas/permit_backend__schemas__schema_opal_data__UserData'
                  type: object
                title: Response Get All Users Data V2 Internal Opal Data  Org Id   Proj Id   Env Id  Users Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /v2/internal/opal_data/{org_id}/{proj_id}/{env_id}/role_assignments:
    get:
      tags:
      - OPAL Data ( EAP )
      summary: Get All Role Assignments Data
      operationId: get_all_role_assignments_data
      parameters:
      - description: 'Either the unique id of the organization, or the URL-friendly key of the organization (i.e: the "slug").'
        required: true
        schema:
          type: string
          format: uuid
          title: Org Id
          description: 'Either the unique id of the organization, or the URL-friendly key of the organization (i.e: the "slug").'
        example: my_organization
        name: org_id
        in: path
      - description: 'Either the unique id of the project, or the URL-friendly key of the project (i.e: the "slug").'
        required: true
        schema:
          type: string
          title: Proj Id
          description: 'Either the unique id of the project, or the URL-friendly key of the project (i.e: the "slug").'
        example: my_project
        name: proj_id
        in: path
      - description: 'Either the unique id of the environment, or the URL-friendly key of the environment (i.e: the "slug").'
        required: true
        schema:
          type: string
          title: Env Id
          description: 'Either the unique id of the environment, or the URL-friendly key of the environment (i.e: the "slug").'
        example: my_environment
        name: env_id
        in: path
      - description: Timeout for the data generation in the new data generation mode
        required: false
        schema:
          type: number
          maximum: 1800.0
          exclusiveMinimum: 0.0
          title: Timeout
          description: Timeout for the data generation in the new data generation mode
          default: 600.0
        name: timeout
        in: query
      - required: false
        schema:
          type: integer
          minimum: 0.0
          title: X-Shard-Id
        name: X-Shard-ID
        in: header
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  additionalProperties:
                    items:
                      type: string
                    type: array
                  type: object
                type: object
                title: Response Get All Role Assignments Data V2 Internal Opal Data  Org Id   Proj Id   Env Id  Role Assignments Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /v2/internal/opal_data/{org_id}/{proj_id}/{env_id}/resource_instances:
    get:
      tags:
      - OPAL Data ( EAP )
      summary: Get All Resource Instances Data
      operationId: get_all_resource_instances_data
      parameters:
      - description: 'Either the unique id of the organization, or the URL-friendly key of the organization (i.e: the "slug").'
        required: true
        schema:
          type: string
          format: uuid
          title: Org Id
          description: 'Either the unique id of the organization, or the URL-friendly key of the organization (i.e: the "slug").'
        example: my_organization
        name: org_id
        in: path
      - description: 'Either the unique id of the project, or the URL-friendly key of the project (i.e: the "slug").'
        required: true
        schema:
          type: string
          title: Proj Id
          description: 'Either the unique id of the project, or the URL-friendly key of the project (i.e: the "slug").'
        example: my_project
        name: proj_id
        in: path
      - description: 'Either the unique id of the environment, or the URL-friendly key of the environment (i.e: the "slug").'
        required: true
        schema:
          type: string
          title: Env Id
          description: 'Either the unique id of the environment, or the URL-friendly key of the environment (i.e: the "slug").'
        example: my_environment
        name: env_id
        in: path
      - description: Timeout for the data generation in the new data generation mode
        required: false
        schema:
          type: number
          maximum: 1800.0
          exclusiveMinimum: 0.0
          title: Timeout
          description: Timeout for the data generation in the new data generation mode
          default: 600.0
        name: timeout
        in: query
      - required: false
        schema:
          type: integer
          minimum: 0.0
          title: X-Shard-Id
        name: X-Shard-ID
        in: header
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                - additionalProperties:
                    $ref: '#/components/schemas/data_generator_lib__schemas__schema_opal_data__ResourceInstanceAttributeData'
                  type: object
                - additionalProperties:
                    $ref: '#/components/schemas/permit_backend__schemas__schema_opal_data__ResourceInstanceAttributeData'
                  type: object
                title: Response Get All Resource Instances Data V2 Internal Opal Data  Org Id   Proj Id   Env Id  Resource Instances Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
