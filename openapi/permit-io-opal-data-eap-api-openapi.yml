        name: X-Shard-ID
        in: header
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  additionalProperties:
                    additionalProperties:
                      items:
                        type: string
                      type: array
                    type: object
                  type: object
                type: object
                title: Response Get All Relationships Data V2 Internal Opal Data  Org Id   Proj Id   Env Id  Relationships Get
