          - $ref: '#/components/schemas/AuditLogObjectsModel'
          title: Objects
          default: {}
      type: object
      required:
      - id
      - raw_data
      - timestamp
      - org_id
      - project_id
      - env_id
      title: DetailedAuditLogModel
    Engine:
