        query:
          type: string
          title: Query
        user_key:
          type: string
          title: User Key
        user_email:
          type: string
          title: User Email
        user_name:
          type: string
          title: User Name
        resource_type:
          type: string
          title: Resource Type
        tenant:
          type: string
          title: Tenant
        action:
          type: string
          title: Action
        decision:
