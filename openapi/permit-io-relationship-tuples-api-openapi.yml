        deprecated: true
        schema:
          type: boolean
          title: Detailed
          description: If true, will return the full subject and object resource instances.
          default: false
        name: detailed
        in: query
      - description: If true, returns the list of resource instances and the total count.
        required: false
        deprecated: true
        schema:
          type: boolean
          title: Include Total Count
          description: If true, returns the list of resource instances and the total count.
          default: false
        name: include_total_count
        in: query
      - description: Page number of the results to fetch, starting at 1.
        required: false
        schema:
          type: integer
          minimum: 1.0
          title: Page
          description: Page number of the results to fetch, starting at 1.
          default: 1
        name: page
        in: query
      - description: The number of results per page (max 100).
        required: false
        schema:
          type: integer
          maximum: 100.0
          minimum: 1.0
          title: Per Page
          description: The number of results per page (max 100).
          default: 30
        name: per_page
        in: query
      - description: The tenant key or id to filter by
        required: false
        schema:
          type: string
          title: Tenant
          description: The tenant key or id to filter by
        name: tenant
        in: query
      - description: The subject to filter by, accepts either the resource instance id or resource_type:resource_instance
        required: false
        schema:
          type: string
          title: Subject
          description: The subject to filter by, accepts either the resource instance id or resource_type:resource_instance
        name: subject
        in: query
      - description: The relation id or key to filter by
        required: false
        schema:
