      operationId: list_relationship_tuples_detailed
      parameters:
      - description: 'Either the unique id of the project, or the URL-friendly key of the project (i.e: the "slug").'
        required: true
        schema:
          type: string
          title: Proj Id
          description: 'Either the unique id of the project, or the URL-friendly key of the project (i.e: the "slug").'
        example: my_project
        name: proj_id
        in: path
      - description: 'Either the unique id of the environment, or the URL-friendly key of the environment (i.e: the "slug").'
        required: true
        schema:
          type: string
          title: Env Id
          description: 'Either the unique id of the environment, or the URL-friendly key of the environment (i.e: the "slug").'
        example: my_environment
        name: env_id
        in: path
      - description: Page number of the results to fetch, starting at 1.
        required: false
        schema:
          type: integer
          minimum: 1.0
          title: Page
          description: Page number of the results to fetch, starting at 1.
          default: 1
        name: page
        in: query
      - description: The number of results per page (max 100).
        required: false
        schema:
          type: integer
          maximum: 100.0
          minimum: 1.0
          title: Per Page
          description: The number of results per page (max 100).
          default: 30
        name: per_page
        in: query
      - description: The tenant key or id to filter by
        required: false
        schema:
          type: string
          title: Tenant
          description: The tenant key or id to filter by
        name: tenant
        in: query
      - description: The subject to filter by, accepts either the resource instance id or resource_type:resource_instance
        required: false
        schema:
          type: string
          title: Subject
          description: The subject to filter by, accepts either the resource instance id or resource_type:resource_instance
        name: subject
        in: query
      - description: The relation id or key to filter by
        required: false
        schema:
          type: string
          title: Relation
          description: The relation id or key to filter by
        name: relation
        in: query
      - description: The object to filter by, accepts either the resource instance id or resource_type:resource_instance
        required: false
        schema:
          type: string
          title: Object
          description: The object to filter by, accepts either the resource instance id or resource_type:resource_instance
        name: object
        in: query
      - description: The object type to filter by, accepts resource type id or key
        required: false
        schema:
          type: string
          title: Object Type
          description: The object type to filter by, accepts resource type id or key
        name: object_type
        in: query
      - description: The subject type to filter by, accepts resource type id or key
        required: false
        schema:
          type: string
          title: Subject Type
          description: The subject type to filter by, accepts resource type id or key
